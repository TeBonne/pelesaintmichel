<!-- Données structurées : FAQ (résultats enrichis) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    { "@type": "Question", "name": "Qu'est-ce qu'un miquelot ?",
      "acceptedAnswer": { "@type": "Answer", "text": "Un miquelot, c'est tout simplement un pèlerin du Mont Saint-Michel, et ce depuis la fin du premier millénaire." } },
    { "@type": "Question", "name": "Faut-il marcher seul ou en groupe ?",
      "acceptedAnswer": { "@type": "Answer", "text": "Vous pouvez vous inscrire seul, mais nous vous invitons à former un chapitre avec des pèlerins de votre région, si possible avec un prêtre aumônier." } },
    { "@type": "Question", "name": "Combien de kilomètres par jour ?",
      "acceptedAnswer": { "@type": "Answer", "text": "Environ 20 à 30 km par jour pour les adultes, sur routes balisées ou de campagne. Des voitures-balais accompagnent les pèlerins fatigués." } },
    { "@type": "Question", "name": "Faut-il être baptisé pour participer ?",
      "acceptedAnswer": { "@type": "Answer", "text": "Non, le pèlerinage est ouvert à toute personne désireuse d'approfondir sa foi ; il s'agit toutefois d'un pèlerinage catholique." } }
  ]
}
</script>
<link rel="stylesheet" href="colors_and_type.css">
<style>

<script type="text/babel">
function App() {
  const [active, setActive] = React.useState("Accueil");
  const scrollTo = (id) => {
    const el = document.getElementById(id);
    const container = document.getElementById("site-scroll");
    if (el && container) container.scrollTo({ top: el.offsetTop - 70, behavior: "smooth" });
  };
  const onNav = (l) => {
    setActive(l);
    const map = { "Accueil": "site-scroll", "Le pèlerinage": "sec-prog", "Programme": "sec-prog",
      "Prier": "sec-cit", "FAQ": "sec-faq" };
    const sc = document.getElementById("site-scroll");
    if (l === "Accueil") sc.scrollTo({ top: 0, behavior: "smooth" });
    else if (l === "Nous soutenir") sc.scrollTo({ top: sc.scrollHeight, behavior: "smooth" });
    else scrollTo(map[l]);
  };
  const onInscription = () => scrollTo("inscription");
  return (
    <div id="site-scroll">
      <SiteHeader active={active} onNav={onNav} onInscription={onInscription} />
      <main id="contenu">
        <Hero onInscription={onInscription} />
        <Chiffres />
        <div id="sec-prog"><Programme /></div>
        <div id="sec-cit"><Citation /></div>
        <div id="sec-faq"><FAQ /></div>
        <InscriptionForm />
      </main>
      <SiteFooter />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script src="anims.js"></script>
</body>
